<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Karate Roulette</title>
<style>
  :root {
    --bg-dark: #0a0a0a;
    --surface: #1a1a1a;
    --text-main: #f4f4f4;
    --text-muted: #888888;
    --accent-red: #d32f2f;
    --border-radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }

  body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .screen {
    display: none;
    flex: 1;
    padding: 24px;
    flex-direction: column;
    animation: fadeIn 0.3s ease;
  }

  .screen.active { display: flex; }

  h1, h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; text-align: center; }
  
  .input-group { display: flex; gap: 8px; margin-bottom: 24px; }
  input[type="text"], input[type="number"] {
    flex: 1; padding: 16px; border: 1px solid #333; background: var(--surface); color: white;
    border-radius: var(--border-radius); font-size: 16px; outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent-red); }

  button {
    background-color: var(--surface); color: var(--text-main);
    border: 1px solid #333; padding: 16px 24px; border-radius: var(--border-radius);
    font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px;
  }
  button.primary {
    background-color: var(--accent-red); border-color: var(--accent-red); width: 100%;
    margin-top: auto; /* Anchors to bottom */
  }
  button:active { transform: scale(0.98); }

  .player-list { list-style: none; flex: 1; overflow-y: auto; }
  .player-list li {
    padding: 16px; background: var(--surface); margin-bottom: 8px; border-radius: var(--border-radius);
    display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent-red);
  }

  .combo-display {
    font-size: 28px; font-weight: 800; text-align: center; margin: auto 0;
    line-height: 1.5; color: var(--accent-red);
  }

  .slider-group { margin-bottom: 24px; }
  .slider-group label { display: flex; justify-content: space-between; margin-bottom: 8px; color: var(--text-muted); }
  input[type="range"] { width: 100%; accent-color: var(--accent-red); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

  <div id="setupScreen" class="screen active">
    <h1>Dojo Roster</h1>
    <div class="input-group">
      <input type="text" id="playerName" placeholder="Enter fighter name...">
      <button onclick="addPlayer()">Add</button>
    </div>
    <ul id="players" class="player-list"></ul>
    
    <div class="input-group" style="margin-top: 16px;">
      <input type="number" id="comboTime" placeholder="Time limit (sec) or leave blank">
    </div>
    <button class="primary" onclick="startGame()">Start Tournament</button>
  </div>

  <div id="actionScreen" class="screen">
    <h2 id="roundDisplay">Round 1</h2>
    <p style="text-align: center; color: var(--text-muted);">Current Fighter</p>
    <h1 id="currentFighter">---</h1>
    
    <div class="combo-display" id="comboMoves">Tap to Spin</div>
    
    <button class="primary" id="actionBtn" onclick="spinRoulette()">Spin Roulette</button>
  </div>

  <div id="scoringScreen" class="screen">
    <h2>Judge <span id="scoringFighter" style="color: var(--accent-red)"></span></h2>
    
    <div class="slider-group">
      <label><span>Accuracy</span> <span id="valAcc">5</span></label>
      <input type="range" id="scoreAcc" min="1" max="10" value="5" oninput="document.getElementById('valAcc').innerText = this.value">
    </div>
    <div class="slider-group">
      <label><span>Power</span> <span id="valPow">5</span></label>
      <input type="range" id="scorePow" min="1" max="10" value="5" oninput="document.getElementById('valPow').innerText = this.value">
    </div>
    <div class="slider-group">
      <label><span>Style</span> <span id="valSty">5</span></label>
      <input type="range" id="scoreSty" min="1" max="10" value="5" oninput="document.getElementById('valSty').innerText = this.value">
    </div>

    <button class="primary" onclick="submitScore()">Submit Score</button>
  </div>

<script>
  // Centralized State
  const state = {
    players: [],
    timeLimit: null,
    currentRound: 1,
    currentPlayerIndex: 0,
    scores: {} // { "Name": totalScore }
  };

  const moves = {
    strikes: ["Jab", "Cross", "Hook", "Uppercut", "Backfist"],
    kicks: ["Front Kick", "Roundhouse", "Side Kick", "Axe Kick"],
    blocks: ["High Block", "Low Block"]
  };

  function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  }

  function addPlayer() {
    const input = document.getElementById('playerName');
    const name = input.value.trim();
    if (name && !state.players.includes(name)) {
      state.players.push(name);
      state.scores[name] = 0;
      
      const li = document.createElement('li');
      li.innerText = name;
      document.getElementById('players').appendChild(li);
      input.value = '';
    }
  }

  function startGame() {
    if (state.players.length < 2) return alert("Need at least 2 fighters!");
    state.timeLimit = document.getElementById('comboTime').value;
    switchScreen('actionScreen');
    setupTurn();
  }

  function setupTurn() {
    document.getElementById('roundDisplay').innerText = `Round ${state.currentRound}`;
    document.getElementById('currentFighter').innerText = state.players[state.currentPlayerIndex];
    document.getElementById('comboMoves').innerText = "???";
    
    const btn = document.getElementById('actionBtn');
    btn.innerText = "Spin Roulette";
    btn.onclick = spinRoulette;
  }

  function spinRoulette() {
    // Quick pseudo-animation
    let ticks = 0;
    const interval = setInterval(() => {
      document.getElementById('comboMoves').innerText = generateCombo(state.currentRound + 1).join(" + ");
      ticks++;
      if (ticks > 15) {
        clearInterval(interval);
        startComboExecution();
      }
    }, 50);
  }

  function generateCombo(moveCount) {
    const allMoves = [...moves.strikes, ...moves.kicks, ...moves.blocks];
    let combo = [];
    for(let i=0; i<moveCount; i++) {
      combo.push(allMoves[Math.floor(Math.random() * allMoves.length)]);
    }
    return combo;
  }

  function startComboExecution() {
    const btn = document.getElementById('actionBtn');
    btn.innerText = "Combo Finished!";
    btn.onclick = () => switchScreen('scoringScreen');
    document.getElementById('scoringFighter').innerText = state.players[state.currentPlayerIndex];
    // Timer logic could go here if state.timeLimit is set
  }

  function submitScore() {
    const acc = parseInt(document.getElementById('scoreAcc').value);
    const pow = parseInt(document.getElementById('scorePow').value);
    const sty = parseInt(document.getElementById('scoreSty').value);
    
    const total = acc + pow + sty;
    state.scores[state.players[state.currentPlayerIndex]] += total;

    // Advance Turn
    state.currentPlayerIndex++;
    if (state.currentPlayerIndex >= state.players.length) {
      state.currentPlayerIndex = 0;
      state.currentRound++;
      if (state.currentRound > 3) {
        alert("Game Over! Check console for scores.");
        console.log(state.scores);
        // Implement Scoreboard Screen here
        return;
      }
    }
    switchScreen('actionScreen');
    setupTurn();
  }
</script>
</body>
</html>
